name: GreaterWMS CI

# DEVOPS-005: GitHub Actions CI/CD pipeline
on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov flake8

      - name: Set environment
        run: |
          echo "DEBUG=True" >> $GITHUB_ENV
          echo "ALLOWED_HOSTS=localhost,127.0.0.1,testserver" >> $GITHUB_ENV
          echo "DJANGO_SECRET_KEY=ci-testing-secret-key-not-for-production" >> $GITHUB_ENV
          echo "JWT_SALT=ci-testing-jwt-salt-not-for-production" >> $GITHUB_ENV

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=templates,node_modules,migrations
          flake8 . --count --exit-zero --max-complexity=15 --max-line-length=150 --statistics --exclude=templates,node_modules,migrations

      - name: Run migrations
        run: python manage.py migrate --run-syncdb

      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --target backend -t greaterwms/backend:${{ github.sha }} .

      - name: Build frontend image
        run: docker build --target front -t greaterwms/front:${{ github.sha }} .